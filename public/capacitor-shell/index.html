<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Koku Dedektifi</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 70% 22%, rgba(201, 169, 110, 0.12), transparent 38%),
          radial-gradient(circle at 18% 86%, rgba(126, 184, 164, 0.12), transparent 34%),
          #09080a;
        color: #ebe4d8;
        font-family: 'DM Sans', system-ui, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .shell {
        width: min(100%, 420px);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(17, 15, 19, 0.88);
        padding: 28px 24px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 14px;
        font: 11px/1.2 'DM Mono', ui-monospace, monospace;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #c9a96e;
      }

      h1 {
        margin: 0;
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 38px;
        font-style: italic;
        font-weight: 500;
        line-height: 0.95;
      }

      p {
        margin: 18px 0 0;
        color: #9a948d;
        line-height: 1.7;
        font-size: 14px;
      }

      .bar {
        margin-top: 24px;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .bar::after {
        content: '';
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #c9a96e 0%, #d6b987 100%);
        animation: glide 1.4s ease-in-out infinite alternate;
      }

      @keyframes glide {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(120%);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <p class="eyebrow">Mobil shell hazırlanıyor</p>
      <h1>Koku Dedektifi</h1>
      <p>Premium deneyim yükleniyor. İnternet bağlantısı geldiğinde uygulama doğrudan canlı ürünü açacak.</p>
      <div class="bar"></div>
    </div>
  </body>
  </html>
