name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript kontrolu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          GEMINI_API_KEY: placeholder-for-ci
          OPS_USER: ci
          OPS_PASSWORD: ci-password-placeholder
          NODE_ENV: production
      - name: Smoke test
        run: |
          npx next start &
          sleep 5
          curl -f http://localhost:3000/ || exit 1
          curl -f http://localhost:3000/api/health || echo "Health endpoint opsiyonel"
          kill %1

